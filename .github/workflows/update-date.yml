name: Update README Date

on:
  push:
    branches: [ main ]

jobs:
  update-date:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update date in README
        run: |
          DATE=$(date +'%d-%b-%Y')
          sed -i "s/Updated:        <!-- UPDATED_DATE -->/Updated:        $DATE/g" README.md
          
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "docs: auto-update last modified date" || exit 0
          git push
