<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook Pages Flip</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/doodle/50/books.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/simple-line-icons/2.5.5/css/simple-line-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Life+Savers:wght@400;700;800&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Notebook Page Flip.css">
  </head>
<body>
<div class="main-content">

  <h1>
  School Notebook
    <small> Hover on any notebook... <br> 
      <img width="50" height="50" src="https://img.icons8.com/stickers/100/hand-right.png" alt="hand-right" style="margin-top:30px;"/> 
    </small>
  </h1>

  <div class="notebook-wrapper">
    <div class="notebook">
      <div class="notebook-cover">
        <div class="skin">NOTEBOOK</div>
      </div>
      <div class="page page1 dotted"></div>
      <div class="page page2 dotted"></div>
      <div class="page page3 dotted"></div>
      <div class="page page4 dotted"></div>
      <div class="page page5 dotted"></div>
      <div class="page page6 dotted"></div>
    </div>
  </div>

  </div>

  <footer>
  <h3 style = 'text-align: center; color: #fff;'>Inspired by CodePen: Olivia Ng</h3>

    <a href="https://twitter.com_" target="_blank">
      <i class="icon-social-twitter icons"></i>
    </a>
    <a href="https://github.com" target="_blank">
      <i class="icon-social-github icons"></i>
    </a>
    <a href="https://instagram.com" target="_blank">
      <i class="icon-social-instagram icons"></i>
    </a>
  </footer>

</body>
</html>
