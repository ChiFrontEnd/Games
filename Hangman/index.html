<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game JavaScript | CodingNepal</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/liquid-glass/48/controller.png">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <p id="title">Hangman Game</p>

        <div class="game-modal">
            <div class="content">
                <img decoding="async" src="#" alt="gif">
                <h4>Game Over!</h4>
                <p>The correct word was: <b>rainbow</b></p>
                <button class="play-again">Play Again</button>
            </div>
        </div>

        <div class="container">
            <div class="hangman-box">
                <img decoding="async" src="#" alt="hangman-img">

            </div>
            <div class="game-box">
                <ul class="word-display"></ul>
                <h4 class="hint-text">Hint: <b></b></h4>
                <h4 class="guesses-text">Incorrect guesses: <b></b></h4>
                <div class="keyboard"></div>
            </div>
        </div>

        <!-- Pehle word list wali file -->
        <script src="word-list.js"></script>
        <script src="Script.js"></script>
</body>
</html>
